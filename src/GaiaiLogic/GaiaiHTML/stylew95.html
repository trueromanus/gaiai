<html>
	<head>
	  <link rel="stylesheet" href="w95style.css">
	  <style>
		@set win95-horizontal-scroll
		{
			.prev 
			{ 
				background-color: #BFB8BF;
				border-width: 1px;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;		
				box-shadow: 1px 1px black;
				foreground-image: url( leftarrowicon.svg ); 
				foreground-position: 60% 50%;
				foreground-size: 8px 8px;
				foreground-repeat: no-repeat;
				width: 16px;
				margin-right: 1px;
			}
			.next 
			{ 
				background-color: #BFB8BF;
				border-width: 1dip;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;				
				box-shadow: 1px 1px black;				
				foreground-image: url( rightarrowicon.svg ); 
				foreground-position: 60% 50%;
				foreground-size: 8px 8px;
				foreground-repeat: no-repeat; 
				width:16dip;
				margin-right: 1px;
			}			
		
			.base, .next-page, .prev-page
			{ 
				background-image:url(tile2x2.png);
				background-repeat: expand;
			}
		 
			.slider
			{ 
				background-color: #BFB8BF;
				border-width: 1px;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;			
				box-shadow: 1px 1px black;
				margin-right: 1px;
			}
		  
			.next:disabled, .slider:disabled, 
			.prev:disabled {
				foreground-image:none; border:none; foreground-image:none; width:0;
			}

			.base:disabled
			{
				background-image:url(tile2x2.png);
				background-repeat: expand;
			}  
		  
			.next:hover, .prev:hover {
			}

			.next:active, .prev:active {
				border-top-color: black;
				border-left-color: black;
				border-right-color: #7f787f;
				border-bottom-color: #7f787f;
				box-shadow: 1px 1px white;
			}
		  
			.base {
				height: 16px;
			}		  
		}
		
		@set win95-vertical-scroll {
			.prev 
			{ 
				background-color: #BFB8BF;
				border-width: 1px;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;		
				box-shadow: 1px 1px black;
				foreground-image: url( leftarrowicon.svg ); 
				foreground-position: 60% 50%;
				foreground-size: 8px 8px;
				foreground-repeat: no-repeat;
				height: 16px;
				margin-bottom: 1px;
			}
		  
			.next 
			{ 
				background-color: #BFB8BF;
				border-width: 1dip;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;				
				box-shadow: 1px 1px black;				
				foreground-image: url( rightarrowicon.svg ); 
				foreground-position: 60% 50%;
				foreground-size: 8px 8px;
				foreground-repeat: no-repeat; 
				height: 16px;
				margin-bottom: 1px;
			}
  
			.base, .next-page, .prev-page 
			{ 
				background-image:url(tile2x2.png);
				background-repeat: expand;
			}
		  
			.slider 
			{ 
				background-color: #BFB8BF;
				border-width: 1px;
				border-style: solid;
				border-top-color: #FFF8FF;
				border-left-color: #FFF8FF;
				border-right-color: #7B7B7B;
				border-bottom-color: #7B7B7B;			
				box-shadow: 1px 1px black;
				margin-right: 1px;
				margin-bottom: 1px;
			}
		  
			.next:disabled, .slider:disabled, .prev:disabled  {
				height:0; border:none; foreground-image:none;
			}
		  
			.base:disabled
			{
				background-image:url( images/sb-scroll-base.png ); 
				background-repeat:repeat; 
				background-position:0 0 0 0;
			}
			
			.next:hover,   .slider:hover, .prev:hover {
			}

			.next:active, .prev:active    {
				border-top-color: black;
				border-left-color: black;
				border-right-color: #7f787f;
				border-bottom-color: #7f787f;
				box-shadow: 1px 1px white;
			}

			.base { width: 16px; }
			.corner {
				background-color: #BFB8BF;
			}
		}
		
		.test-overflow {
			vertical-scrollbar: win95-vertical-scroll;
			horizontal-scrollbar: win95-horizontal-scroll;
		}
	  </style>
	</head>
	<body>
		<div style="width: 300px; height: 200px; overflow: auto; border: 1px solid brown;" class="test-overflow">
			<div style="width: 500px; height: 500px; background-color: red; border: 1px solid lightgray;">
			</div>
		</div>
		<div style="background-color: #d3d3d3;">
			<!-- Horizontal line divider -->
			<div style="padding-top: 10px;" class="horizontal-line"><div class="first-line"></div><div class="second-line"></div></div>

			<!-- Panel -->
			<div style="margin: 10px;" class="panel">Panel content</div>

			<!-- Reverted Panel -->
			<div style="display: flex; flex-direction: row;">
				<div style="width: 1px; height: 25px;" class="reverted-panel"></div>
				<div style="margin-left: 1px; width: 1px; height: 25px;" class="reverted-panel"></div>
			</div>		
		</div>

		<!-- menu panel -->
		<div style="margin: 10px;" class="menu-outer-panel">
			<div class="menu-middle-panel">
				<div class="menu-inner-panel">
					Line1<br>
					Line2<br>
					Line3<br>
					Line4
				</div>
			</div>
		</div>
		
		<!-- Window Panel -->
		<div style="margin: 10px;" class="window-panel">
			<div class="inner-panel">
				<div class="window-active-header" style="height: 20px;">
					<span style="margin-left: 4px;">Header</span>
				</div>
				
				<!-- Vertical line divider -->
				<div style="padding-left: 10px; height: 30px;" class="vertical-line"><div class="first-line"></div><div class="second-line"></div></div>
				<div style="height: 50px;">
				</div>
			</div>
		</div>		

		<!-- button idle panel -->
		<div style="margin: 10px;" class="button-idle-panel">
			<div>
				Line1<br>
				Line2<br>
				Line3<br>
				Line4
			</div>
		</div>

		<!-- button pressed panel -->
		<div style="margin: 10px;" class="button-pressed-panel">
			<div>
				Line1<br>
				Line2<br>
				Line3<br>
				Line4
			</div>
		</div>

		<div style="margin: 10px; width: 100px; height: 70px" class="grid-panel">
		</div>

		<div style="margin: 10px; width: 100px; height: 70px" class="dash-rectangle">
		</div>

		<div style="margin: 10px; width: 100px;" class="horizontal-dash-line">
		</div>

		<div style="margin: 10px; height: 50px;" class="vertical-dash-line">
		</div>

		<div style="height: 40px; width: 100%;" class="task-bar">
		</div>		
	</body>
</html>
